# iterm2-keys.conf — iTerm2 escape sequence bridge for tmux
#
# iTerm2 is configured to send custom escape sequences for Cmd+key combos.
# This file defines tmux user-keys that match those sequences, then binds
# them to the corresponding tmux actions.
#
# Requires tmux 3.6+ (user-keys support).
# Source this file from tmux.conf:  source-file ~/.config/tmux/iterm2-keys.conf

# ---------------------------------------------------------------------------
# Splits
# ---------------------------------------------------------------------------

# Cmd+D -> vertical split (side-by-side, matching iTerm2 behaviour)
set -s user-keys[0] "\e[1;9d"
bind-key -n User0 split-window -h

# Cmd+Shift+D -> horizontal split (top/bottom)
set -s user-keys[1] "\e[1;10d"
bind-key -n User1 split-window -v

# ---------------------------------------------------------------------------
# Windows / Tabs
# ---------------------------------------------------------------------------

# Cmd+T -> new window
set -s user-keys[2] "\e[1;9t"
bind-key -n User2 new-window

# Cmd+W -> kill pane
set -s user-keys[3] "\e[1;9w"
bind-key -n User3 kill-pane

# Cmd+1..9 -> select window 1-9
set -s user-keys[4]  "\e[1;91"
set -s user-keys[5]  "\e[1;92"
set -s user-keys[6]  "\e[1;93"
set -s user-keys[7]  "\e[1;94"
set -s user-keys[8]  "\e[1;95"
set -s user-keys[9]  "\e[1;96"
set -s user-keys[10] "\e[1;97"
set -s user-keys[11] "\e[1;98"
set -s user-keys[12] "\e[1;99"

bind-key -n User4  select-window -t :1
bind-key -n User5  select-window -t :2
bind-key -n User6  select-window -t :3
bind-key -n User7  select-window -t :4
bind-key -n User8  select-window -t :5
bind-key -n User9  select-window -t :6
bind-key -n User10 select-window -t :7
bind-key -n User11 select-window -t :8
bind-key -n User12 select-window -t :9

# Cmd+Left -> previous window
set -s user-keys[13] "\e[1;9C"
bind-key -n User13 previous-window

# Cmd+Right -> next window
set -s user-keys[14] "\e[1;9N"
bind-key -n User14 next-window

# ---------------------------------------------------------------------------
# Pane Navigation
# ---------------------------------------------------------------------------

# Cmd+[ -> previous pane
set -s user-keys[15] "\e[1;9["
bind-key -n User15 select-pane -t :.-

# Cmd+] -> next pane
set -s user-keys[16] "\e[1;9]"
bind-key -n User16 select-pane -t :.+

# ---------------------------------------------------------------------------
# Pane Resizing
# ---------------------------------------------------------------------------

# Cmd+Option+Up -> resize pane up
set -s user-keys[17] "\e[1;11A"
bind-key -n User17 resize-pane -U 5

# Cmd+Option+Down -> resize pane down
set -s user-keys[18] "\e[1;11B"
bind-key -n User18 resize-pane -D 5

# Cmd+Option+Left -> resize pane left
set -s user-keys[19] "\e[1;11C"
bind-key -n User19 resize-pane -L 5

# Cmd+Option+Right -> resize pane right
set -s user-keys[20] "\e[1;11D"
bind-key -n User20 resize-pane -R 5

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------

# Cmd+Shift+Enter -> toggle zoom
set -s user-keys[21] "\e[1;9z"
bind-key -n User21 resize-pane -Z

# Cmd+K -> clear scrollback
set -s user-keys[22] "\e[1;9k"
bind-key -n User22 send-keys -R \; clear-history
